services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: ".env"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noterian_network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    env_file: ".env"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:${MINIO_API_PORT}/minio/health/live",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noterian_network

  auth:
    build:
      context: .
      dockerfile: cmd/auth/Dockerfile
    restart: unless-stopped
    env_file: ".env"
    environment:
      SERVER_PORT: 50051
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - noterian_network

  notes:
    build:
      context: .
      dockerfile: cmd/notes/Dockerfile
    restart: unless-stopped
    env_file: ".env"
    environment:
      SERVER_PORT: 50052
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - noterian_network

  profiles:
    build:
      context: .
      dockerfile: cmd/profiles/Dockerfile
    restart: unless-stopped
    env_file: ".env"
    environment:
      SERVER_PORT: 50053
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
    ports:
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - noterian_network

  attachments:
    build:
      context: .
      dockerfile: cmd/attachments/Dockerfile
    restart: unless-stopped
    env_file: ".env"
    environment:
      SERVER_PORT: 50054
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
    ports:
      - "50054:50054"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - noterian_network

  main:
    build:
      context: .
      dockerfile: cmd/main/Dockerfile
    restart: unless-stopped
    env_file: ".env"
    environment:
      SERVER_PORT: 8000
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - noterian_network

volumes:
  postgres_data:
  minio_data:

networks:
  noterian_network:
    driver: bridge
