syntax = "proto3";

package notes;

option go_package = "proto/notes/grpc/gen";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service NoteService {
    rpc GetNote(GetNoteRequest) returns (NoteResponse);
    rpc GetBlock(GetBlockRequest) returns (BlockResponse);
    rpc GetBlocks(GetBlocksRequest) returns (GetBlocksResponse);
    rpc CreateBlock(CreateBlockRequest) returns (BlockResponse);
    rpc ShiftBlockPositions(ShiftBlockPositionsRequest) returns (google.protobuf.Empty);
    rpc DeleteBlock(DeleteBlockRequest) returns (DeleteBlockResponse);
}

message GetNoteRequest {
    string note_id = 1;
    string user_id = 2;
}

message GetBlockRequest {
    string block_id = 1;
    string note_id = 2;
    string user_id = 3;
}

message GetBlocksRequest {
    string note_id = 1;
    string user_id = 2;
}

message CreateBlockRequest {
    string user_id = 1;
    BlockResponse block = 2;
}

message ShiftBlockPositionsRequest {
    string note_id = 1;
    int32 from_position = 2;
    int32 direction = 3;
}

message DeleteBlockRequest {
    string block_id = 1;
    string note_id = 2;
    string user_id = 3;
}

message DeleteBlockResponse {
    string note_id = 1;
}

message NoteResponse {
    string id = 1;
    string user_id = 2;
    string title = 3;
    optional string parent_id = 4;
    bool is_public = 5;
    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
}

message BlockResponse {
    string id = 1;
    string note_id = 2;
    int32 block_type_id = 3;
    int32 position = 4;
    string content = 5;
    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
}

message GetBlocksResponse {
    repeated BlockResponse blocks = 1;
}
