basePath: /
consumes:
- application/json
definitions:
  dto.Attachment:
    properties:
      attach_url:
        type: string
      block_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      minio_key:
        type: string
      updated_at:
        type: string
      url_expires_at:
        type: string
    type: object
  dto.Avatar:
    properties:
      avatarURL:
        type: string
      createdAt:
        type: string
      id:
        type: string
      minioKey:
        type: string
      profileID:
        type: string
      updatedAt:
        type: string
      urlexpiresAt:
        type: string
    type: object
  dto.Block:
    properties:
      block_type_id:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      note_id:
        type: string
      position:
        type: integer
      updated_at:
        type: string
    type: object
  dto.BlockFormatting:
    properties:
      block_id:
        type: string
      ranges:
        items:
          $ref: '#/definitions/dto.FormattingRange'
        type: array
    type: object
  dto.BlockRequest:
    properties:
      block_type_id:
        type: integer
      content:
        type: string
      note_id:
        type: string
      position:
        type: integer
    type: object
  dto.BlockWithFormatting:
    properties:
      block_type_id:
        type: integer
      content:
        type: string
      created_at:
        type: string
      formatting:
        $ref: '#/definitions/dto.BlockFormatting'
      id:
        type: string
      note_id:
        type: string
      position:
        type: integer
      updated_at:
        type: string
    type: object
  dto.FormattingRange:
    properties:
      bold:
        type: boolean
      end_pos:
        description: exclusive
        type: integer
      italic:
        type: boolean
      start_pos:
        description: inclusive
        type: integer
      text_align:
        description: '0: left, 1: center, 2: right'
        type: integer
      underline:
        type: boolean
    type: object
  dto.MoveBlockRequest:
    properties:
      new_position:
        type: integer
    type: object
  dto.Note:
    properties:
      created_at:
        type: string
      id:
        type: string
      parent_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  dto.NoteRequest:
    properties:
      parent_id:
        type: string
      title:
        type: string
    type: object
  dto.NoteResponse:
    properties:
      blocks:
        items:
          $ref: '#/definitions/dto.BlockWithFormatting'
        type: array
      note:
        $ref: '#/definitions/dto.Note'
    type: object
  dto.NotesResponse:
    properties:
      notes:
        items:
          $ref: '#/definitions/dto.Note'
        type: array
      total:
        type: integer
    type: object
  dto.Profile:
    properties:
      created_at:
        type: string
      id:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  dto.SignInUser:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.SignUpUser:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.UpdateBlockContentRequest:
    properties:
      content:
        type: string
    type: object
  dto.UpdatePassword:
    properties:
      new_password:
        type: string
      old_password:
        type: string
    type: object
  dto.UserResponse:
    properties:
      id:
        type: string
      username:
        type: string
    type: object
host: localhost:8000
info:
  contact: {}
  description: API for note-taking application
  title: WHITECROWSOFT API
  version: "1.0"
paths:
  /csrf/token:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: CSRF token successfully generated
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получение CSRF-токена
      tags:
      - csrf
  /logout:
    post:
      produces:
      - application/json
      responses:
        "204":
          description: Успешный выход, тело ответа отсутствует
        "401":
          description: Неавторизован
          schema:
            additionalProperties:
              type: string
            type: object
        "405":
          description: Неверный метод
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Выход пользователя
      tags:
      - auth
  /notes:
