host: localhost:8000
info:
  contact: {}
  description: |-
    API for the Noterian note-taking application.
    Authentication is performed via a JWT-cookie set by /signup and /signin.
    State-changing endpoints additionally require an X-CSRF-Token header (obtain it from /csrf-token).
  title: WHITECROWSOFT API
  version: "1.0"
paths:
  /csrf-token:
    get:
      description: Возвращает CSRF-токен в теле и Set-Cookie. Используется во всех
        методах, изменяющих состояние (POST/PUT/DELETE), через заголовок X-CSRF-Token.
      produces:
      - application/json
      responses:
        "200":
          description: CSRF token successfully generated
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получение CSRF-токена
      tags:
      - csrf
  /logout:
    post:
      description: Сбрасывает JWT-cookie текущей сессии.
      produces:
      - application/json
      responses:
        "204":
          description: Успешный выход, тело ответа отсутствует
        "401":
          description: Неавторизован
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Выход пользователя
      tags:
      - auth
  /notes:
    get:
      description: Возвращает все заметки текущего пользователя.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_go-park-mail-ru_2026_1_WHITECROWSOFT_internal_notes_dto.NotesResponse'
        "401":
          description: Неавторизован
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Список заметок пользователя
      tags:
      - notes
    post:
      consumes:
      - application/json
      parameters:
      - description: Параметры заметки
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_go-park-mail-ru_2026_1_WHITECROWSOFT_internal_notes_dto.NoteRequest'
      produces:
